name: Validate PR contribution

on:
  pull_request:
    paths:
      - "scripts/**"
      - "tools/Build-Index.ps1"
      - "tools/Test-Contribution.ps1"
      - ".github/workflows/validate-pr.yml"
      - "CONTRIBUTING.md"
      - "index.json"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: validate-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate contribution checklist
        shell: pwsh
        run: ./tools/Test-Contribution.ps1
        